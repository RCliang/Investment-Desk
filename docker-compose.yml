version: "3.8"
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - MODEL_NAME=${MODEL_NAME:-deepseek-chat}
      - TUSHARE_TOKEN=${TUSHARE_TOKEN}
      - ADMIN_REFRESH_TOKEN=${ADMIN_REFRESH_TOKEN}
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000,http://47.116.178.209:3000
    volumes:
      - backend-data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  backend-data:
