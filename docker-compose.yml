services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # MODEL_NAME 给默认值, CORS_ORIGINS 写死 (不依赖 shell env);
      # 其余 DEEPSEEK_API_KEY/TUSHARE_TOKEN/ADMIN_REFRESH_TOKEN/OSS_*
      # 由 env_file 独立注入, 不在这里重复声明 (重复会用空字符串覆盖).
      - MODEL_NAME=${MODEL_NAME:-deepseek-chat}
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000,http://43.153.151.229:3000
    volumes:
      - ./backend/data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
